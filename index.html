<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Wczytaj plik</title>
</head>
<body>

<h2>Prześlij plik tekstowy</h2>
<input type="file" id="fileInput" accept=".txt">

<script>
document.getElementById("fileInput").addEventListener("change", function(event) {
    const file = event.target.files[0];

    if (file) {
        const reader = new FileReader();

        reader.onload = function(e) {
            // zawartość wczytanego pliku (jeśli chcesz ją użyć)
            const content = e.target.result;
            console.log("Wczytany plik:", content);

            // tworzenie pliku do pobrania
            const text = "dzień dobry";
            const blob = new Blob([text], { type: "text/plain" });

            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "replaymod.txt";

            document.body.appendChild(a);
            a.click();

            document.body.removeChild(a);
        };

        reader.readAsText(file);
    }
});
</script>

</body>
</html>
