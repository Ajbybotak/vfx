<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Generator pliku</title>
</head>
<body>

<h2>Prześlij plik</h2>
<input type="file" id="fileInput" accept=".txt,.json">

<script>
document.getElementById("fileInput").addEventListener("change", function(event) {

    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        const content = e.target.result;

        // znajdź nazwę pliku w usedByPaths
        const match = content.match(/replays\\\\([^\\\\]+)\\.zip/);

        let fileName = "replaymod";

        if (match && match[1]) {
            fileName = match[1];
        }

        // zawartość pliku do pobrania
        const text = "dzień dobry";

        const blob = new Blob([text], { type: "text/plain" });

        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = fileName + ".txt";

        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    };

    reader.readAsText(file);
});
</script>

</body>
</html>
