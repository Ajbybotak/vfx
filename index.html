<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Konwerter</title>
</head>
<body>

<h2>Prześlij plik</h2>
<input type="file" id="fileInput">

<script>

document.getElementById("fileInput").addEventListener("change", function(event){

const file = event.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

const content = e.target.result;

let fileName = "replaymod";
let frames = [];

const data = JSON.parse(content);

if(data.usedByPaths && data.usedByPaths.length > 0){

const path = data.usedByPaths[0];
fileName = path.split("\\").pop().replace(".zip","");

}

const keyframes = data.scenes[0].keyframeTracks[0].keyframesByTick;

for(const tick in keyframes){

const k = keyframes[tick];

frames.push({
tick:Number(tick),
position:k.position,
yaw:k.yaw,
pitch:k.pitch,
roll:k.roll
});

}

frames.sort((a,b)=>a.tick-b.tick);

const times = frames.map(f => f.tick * 50);

const lastTime = times[times.length-1];

const cameraFrames = frames.map((f,i)=>{

const t = f.tick * 50;

return `{"time":${t},"properties":{"camera:position":[${f.position[0]},${f.position[1]},${f.position[2]}],"camera:rotation":[${f.yaw},${f.pitch},${f.roll}]}}`;

}).join(",");

const segments = new Array(frames.length-1).fill(0).join(",");

const text = `,"${fileName}":[{"keyframes":[{"time":0,"properties":{"timestamp":2000}},{"time":${lastTime},"properties":{"timestamp":7000}}],"segments":[0],"interpolators":[{"type":"linear","properties":["timestamp"]}]},{"keyframes":[${cameraFrames}],"segments":[${segments}],"interpolators":[{"type":{"type":"catmull-rom-spline","alpha":0.5},"properties":["camera:position","camera:rotation"]}]}]`;

const blob = new Blob([text],{type:"text/plain"});

const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=fileName+".txt";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

};

reader.readAsText(file);

});

</script>

</body>
</html>
